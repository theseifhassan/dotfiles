---
# group_vars/all/vars.yml
# Shared variables for all machines. Profile-specific values (identity,
# tokens, become password) live in group_vars/personal and group_vars/work.
# This file contains ONLY references and configuration — no secrets or tokens.

xdg_config_home: "{{ ansible_facts['user_dir'] }}/.config"
xdg_data_home: "{{ ansible_facts['user_dir'] }}/.local/share"
xdg_cache_home: "{{ ansible_facts['user_dir'] }}/.cache"
xdg_state_home: "{{ ansible_facts['user_dir'] }}/.local/state"

# Private repo under the personal account. Cloned on the controller (the mini)
# and pushed to targets by the fonts role, so no personal credential is ever
# needed on the work machine.
fonts_repo: "git@github.com:theseifhassan/fonts.git"
# Optional overrides (defaults shown):
# fonts_repo_branch: "master"
# fonts_repo_force_update: false

# Each machine talks to GitHub with its own profile's key — no host aliases.
ssh_hosts:
  - host: "github.com"
    hostname: "github.com"
    user: "git"
    identity_key: "{{ profile }}"
