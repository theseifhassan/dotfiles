---
# group_vars/personal/vars.yml
# Profile for the personal machine (Mac mini — also the Ansible controller).

profile: personal

# Pulled from the vault so a single --ask-vault-pass run also satisfies sudo
# (the tailscale role runs some steps as root).
ansible_become_password: "{{ vault_sudo_password.personal }}"

git_identity:
  name: "Seif Hassan"
  email: "theseifhassan@gmail.com"
  signing_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPalbjJuNDXybI6YhqhYTbXT4Jc+wLUH2PYoTIJ8YPH5"
  signing_format: "ssh"

gh_token: "{{ vault_gh_token.personal }}"
graphite_token: "{{ vault_graphite_token.personal }}"

# Peer machine (see ssh_hosts in group_vars/all): reachable at its tailnet
# IP with this machine's personal key; inbound, the MacBook's work key is
# authorized.
ssh_peer:
  host: "macbook"
  ip: "100.66.53.73"
ssh_peer_authorized_key: "{{ vault_ssh_key.work.public_key }}"
