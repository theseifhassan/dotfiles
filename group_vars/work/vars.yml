---
# group_vars/work/vars.yml
# Profile for the work machine (MacBook). Provisioned by push from the mini —
# no personal credential is ever written here.
#
# One-time vault additions this profile depends on (ansible-vault edit
# group_vars/all/vault.yml):
#   vault_sudo_password.work  — the MacBook's sudo password
#   vault_gh_token.work       — GitHub token for the work account
# (vault_graphite_token.work and vault_ssh_key.work already exist.)

profile: work

ansible_become_password: "{{ vault_sudo_password.work }}"

git_identity:
  name: "Seif Hassan"
  email: "seif@skydeo.com"
  signing_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILWCQt7l1XK5FGHMWPa1wpu9OjHUBYTg/NAJYggHLsXT"
  signing_format: "ssh"

gh_token: "{{ vault_gh_token.work }}"
graphite_token: "{{ vault_graphite_token.work }}"

# Peer machine (see ssh_hosts in group_vars/all): reachable at its tailnet
# IP with this machine's work key; inbound, the mini's personal key is
# authorized.
ssh_peer:
  host: "macmini"
  ip: "100.82.114.33"
ssh_peer_authorized_key: "{{ vault_ssh_key.personal.public_key }}"
