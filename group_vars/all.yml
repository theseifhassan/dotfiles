---
# group_vars/all.yml
# Shared variables for all roles in the Modular Dotfiles System.
# This file contains ONLY references and configuration — no secrets or tokens.

# =============================================================================
# XDG Base Directory Paths
# =============================================================================

xdg_config_home: "{{ ansible_user_dir }}/.config"
xdg_data_home: "{{ ansible_user_dir }}/.local/share"
xdg_cache_home: "{{ ansible_user_dir }}/.cache"
xdg_state_home: "{{ ansible_user_dir }}/.local/state"

# =============================================================================
# Identity Profiles
# =============================================================================

identity_profiles:
  - work
  - personal

# =============================================================================
# Project Directory Paths
# =============================================================================

projects_dir: "{{ ansible_user_dir }}/Projects"

# Per-identity project directories (mirrors identity_profiles)
project_dirs:
  work: "{{ projects_dir }}/work"
  personal: "{{ projects_dir }}/personal"

# =============================================================================
# Git Identities
# =============================================================================

git_identity:
  work:
    name: "Seif Hassan"
    email: "seif@skydeo.com"
    signing_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILWCQt7l1XK5FGHMWPa1wpu9OjHUBYTg/NAJYggHLsXT"
    signing_format: "ssh"  # or "openpgp" for a GPG key
  personal:
    name: "Seif Hassan"
    email: "theseifhassan@gmail.com"
    signing_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPalbjJuNDXybI6YhqhYTbXT4Jc+wLUH2PYoTIJ8YPH5"
    signing_format: "ssh"  # or "openpgp" for a GPG key

# =============================================================================
# Fonts Repository
# =============================================================================

fonts_repo: "git@github.com:theseifhassan/fonts.git"
# Optional overrides (defaults shown):
# fonts_repo_branch: "master"
# fonts_repo_force_update: false

# =============================================================================
# 1Password Item References
# =============================================================================
# These are 1Password item names used with the community.general.onepassword
# lookup plugin.
#
# No secrets or tokens are stored here — only the item names, field names,
# and vault names needed to retrieve them at provisioning time.

# SSH Keys — provisioned to ~/.ssh/id_ed25519_{name}
op_ssh_keys:
  work:
    item: "GitHub SSH Key"
    vault: "Work"
    private_key_field: "private key"
    public_key_field: "public key"
  personal:
    item: "GitHub SSH Key"
    vault: "Personal"
    private_key_field: "private key"
    public_key_field: "public key"
  
# Machine key — provisioned for remote authorized_keys, not for outbound SSH
op_machine_ssh_key:
  item: "{{ ansible_hostname }} SSH Key"
  vault: "Personal"
  private_key_field: "private key"
  public_key_field: "public key"

# SSH config host entries — rendered into ~/.ssh/config
ssh_hosts:
  - host: "work.github.com"
    hostname: "github.com"
    user: "git"
    identity_key: "work"
  - host: "github.com"
    hostname: "github.com"
    user: "git"
    identity_key: "personal"

# GitHub Tokens
op_github_tokens:
  work:
    item: "GitHub Token"
    vault: "Work"
    field: "token"
  personal:
    item: "GitHub Token"
    vault: "Personal"
    field: "token"

# Graphite Tokens
op_graphite_tokens:
  work:
    item: "Graphite Token"
    vault: "Work"
    field: "password"
  personal:
    item: "Graphite Token"
    vault: "Personal"
    field: "password"

# Linear Tokens
op_linear_api_keys:
  work:
    item: "Linear Token"
    vault: "Work"
    field: "password"
  personal:
    item: "Linear Token"
    vault: "Personal"
    field: "password"

# Figma Tokens
op_figma_tokens:
  work:
    item: "Figma Token"
    vault: "Work"
    field: "password"
  personal:
    item: "Figma Token"
    vault: "Personal"
    field: "password"

# Greptile Tokens
op_greptile_tokens:
  work:
    item: "Greptile Token"
    vault: "Work"
    field: "password"
  personal:
    item: "Greptile Token"
    vault: "Personal"
    field: "password"
