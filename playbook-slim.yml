---
# playbook-slim.yml
# Slim provisioning for thin-client Macs that mainly connect to remote servers.
# Sets up only the essentials: SSH keys, git config (core git only, no gh or
# Graphite), 1Password, Slack, DataGrip, Figma, Linear, Discord, Claude Code,
# Zed, Gather, OBS, Wispr Flow, fonts, and Tailscale (to reach the dev server),
# plus the xdg/homebrew foundation.
# Note: claude pulls in zsh via its role dependency.
#
# Run with: ansible-playbook playbook-slim.yml --ask-vault-pass
#       or: ./bootstrap.sh playbook-slim.yml
- name: Modular Dotfiles System (slim)
  hosts: localhost
  connection: local
  gather_facts: true
  gather_subset:
    - "!all"
    - user_dir
    - env

  module_defaults:
    community.general.homebrew:
      path: /opt/homebrew/bin:/usr/local/bin
    community.general.homebrew_cask:
      path: /opt/homebrew/bin:/usr/local/bin
    community.general.homebrew_tap:
      path: /opt/homebrew/bin:/usr/local/bin

  pre_tasks:
    - name: Run xdg role
      ansible.builtin.include_role:
        name: xdg
      tags: [always]

    - name: Run homebrew role
      ansible.builtin.include_role:
        name: homebrew
      tags: [always]

  roles:
    - role: ssh
      tags: [ssh]

    - role: git
      tags: [git]
      vars:
        git_install_extras: false

    - role: 1password
      tags: [1password]

    - role: slack
      tags: [slack]

    - role: datagrip
      tags: [datagrip]

    - role: figma
      tags: [figma]

    - role: linear
      tags: [linear]

    - role: discord
      tags: [discord]

    - role: claude
      tags: [claude]

    - role: zed
      tags: [zed]

    - role: gather
      tags: [gather]

    - role: obs
      tags: [obs]

    - role: wispr-flow
      tags: [wispr-flow]

    - role: fonts
      tags: [fonts]

    # Join the tailnet so this thin client can reach the dev server over
    # Tailscale (SSH + remote editors).
    - role: tailscale
      tags: [tailscale]
