---
# roles/aerospace/tasks/main.yml
# Installs the AeroSpace tiling window manager via Homebrew cask and deploys
# its configuration to the XDG config path.
# AeroSpace natively respects XDG_CONFIG_HOME — the xdg role already sets it.

- name: Tap nikitabobko/tap for AeroSpace
  community.general.homebrew_tap:
    name: nikitabobko/tap
    state: present
    path: /opt/homebrew/bin:/usr/local/bin

- name: Install AeroSpace via Homebrew cask
  community.general.homebrew_cask:
    name: nikitabobko/tap/aerospace
    state: latest
    path: /opt/homebrew/bin:/usr/local/bin

- name: Create aerospace config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/aerospace"
    state: directory
    mode: "0700"

- name: Deploy aerospace config
  ansible.builtin.copy:
    src: aerospace.toml
    dest: "{{ xdg_config_home }}/aerospace/aerospace.toml"
    mode: "0644"
