---
# roles/1password/defaults/main.yml

# Deploy a service-account token so `op read` works headlessly (no desktop-app
# unlock) — needed on the always-on dev server, off everywhere else. The server
# playbook sets this to true.
op_headless: false

# Where the service-account token env file is written (mode 0600).
op_service_account_env: "{{ xdg_config_home }}/op/service-account.env"
