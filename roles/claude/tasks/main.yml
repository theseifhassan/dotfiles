---
# roles/claude/tasks/main.yml
# Installs Claude Code and configures XDG-based config directory.

- name: Install Claude Code
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
  changed_when: true

- name: Create Claude Code directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ xdg_config_home }}/claude"
    - "{{ xdg_config_home }}/claude/skills"
    - "{{ xdg_config_home }}/claudius"

- name: Share global skills with claudius (work instance)
  ansible.builtin.file:
    src: "{{ xdg_config_home }}/claude/skills"
    dest: "{{ xdg_config_home }}/claudius/skills"
    state: link
    force: true

- name: Deploy Claude Code shell config
  ansible.builtin.copy:
    content: |
      export CLAUDE_CONFIG_DIR="{{ xdg_config_home }}/claude"

      # Corporate persona: Claude Code against the isolated work (Team plan) config.
      claudius() { CLAUDE_CONFIG_DIR="{{ xdg_config_home }}/claudius" command claude "$@" }

      # Guardrail: personal claude summoned in a work repo (project not yet
      # stamped with the work CLAUDE_CONFIG_DIR) offers to hand off to claudius.
      # Work detection mirrors `mise run init`: the work.github.com remote alias.
      claude() {
        if [[ -t 0 && -t 1 && "$CLAUDE_CONFIG_DIR" != "{{ xdg_config_home }}/claudius" ]]; then
          local url="$(git remote get-url origin 2>/dev/null)"
          [[ -z "$url" ]] && url="$(git config --get-regexp 'remote\..*\.url' 2>/dev/null | head -n1 | awk '{print $2}')"
          if [[ "$url" == *work.github.com* ]]; then
            print -n "You're running claude in a work project, did you mean to run claudius? [Y/n] "
            local key=""
            read -k 1 key
            [[ "$key" == $'\n' ]] || print
            if [[ "$key" != [nN] ]]; then
              claudius "$@"
              return
            fi
          fi
        fi
        command claude "$@"
      }
    dest: "{{ xdg_config_home }}/zsh/conf.d/claude-code.zsh"
    mode: "0644"
