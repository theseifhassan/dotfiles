---
# roles/claude/tasks/main.yml
# Installs Claude Code and configures XDG-based config directory.

- name: Install Claude Code
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
  changed_when: true

- name: Create Claude Code directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ xdg_config_home }}/claude"
    - "{{ xdg_config_home }}/claude/skills"
    - "{{ xdg_config_home }}/claude/hooks"
    - "{{ xdg_config_home }}/claudius"

- name: Share global skills with claudius (work instance)
  ansible.builtin.file:
    src: "{{ xdg_config_home }}/claude/skills"
    dest: "{{ xdg_config_home }}/claudius/skills"
    state: link
    force: true

# Opens freshly created git worktrees in Zed so they register as workspaces
# (Zed's threads UI only offers open workspaces). One script, shared by both
# instances; it guards for Zed/GUI availability itself, so deploying it on
# machines without Zed is harmless. Deployed as a copy — playbooks may run
# from throwaway worktrees, and a symlink into one would dangle after reap.
- name: Deploy worktree-open hook script
  ansible.builtin.copy:
    src: "{{ role_path }}/files/open-worktree-in-zed"
    dest: "{{ xdg_config_home }}/claude/hooks/open-worktree-in-zed"
    mode: "0755"

# settings.json is otherwise hand-managed (models, plugins, notification
# prefs), so the hook is merged in rather than the file being templated:
# only the hooks.PostToolUse entry this role owns is added, everything else
# is preserved, and the write is skipped when the entry is already present.
- name: Register worktree-open hook in instance settings
  ansible.builtin.shell:
    cmd: |
      python3 - "{{ xdg_config_home }}/{{ item }}/settings.json" \
                "{{ xdg_config_home }}/claude/hooks/open-worktree-in-zed" <<'PY'
      import json, os, sys

      settings_path, hook_command = sys.argv[1], sys.argv[2]
      settings = {}
      if os.path.exists(settings_path):
          with open(settings_path) as f:
              settings = json.load(f)

      matchers = settings.setdefault("hooks", {}).setdefault("PostToolUse", [])
      entry = next((m for m in matchers if m.get("matcher") == "Bash"), None)
      if entry is None:
          entry = {"matcher": "Bash", "hooks": []}
          matchers.append(entry)
      commands = entry.setdefault("hooks", [])

      if any(h.get("command") == hook_command for h in commands):
          print("OK")
      else:
          commands.append({"type": "command", "command": hook_command})
          with open(settings_path, "w") as f:
              json.dump(settings, f, indent=2)
              f.write("\n")
          print("CHANGED")
      PY
  loop:
    - claude
    - claudius
  register: claude_hook_registration
  changed_when: "'CHANGED' in claude_hook_registration.stdout"

- name: Deploy Claude Code shell config
  ansible.builtin.copy:
    content: |
      export CLAUDE_CONFIG_DIR="{{ xdg_config_home }}/claude"

      # Corporate persona: Claude Code against the isolated work (Team plan) config.
      claudius() { CLAUDE_CONFIG_DIR="{{ xdg_config_home }}/claudius" command claude "$@" }

      # Guardrail: personal claude summoned in a work repo (project not yet
      # stamped with the work CLAUDE_CONFIG_DIR) offers to hand off to claudius.
      # Work detection mirrors `mise run init`: the work.github.com remote alias.
      claude() {
        if [[ -t 0 && -t 1 && "$CLAUDE_CONFIG_DIR" != "{{ xdg_config_home }}/claudius" ]]; then
          local url="$(git remote get-url origin 2>/dev/null)"
          [[ -z "$url" ]] && url="$(git config --get-regexp 'remote\..*\.url' 2>/dev/null | head -n1 | awk '{print $2}')"
          if [[ "$url" == *work.github.com* ]]; then
            print -n "You're running claude in a work project, did you mean to run claudius? [Y/n] "
            local key=""
            read -k 1 key
            [[ "$key" == $'\n' ]] || print
            if [[ "$key" != [nN] ]]; then
              claudius "$@"
              return
            fi
          fi
        fi
        command claude "$@"
      }
    dest: "{{ xdg_config_home }}/zsh/conf.d/claude-code.zsh"
    mode: "0644"
