---
# community.general is pre-installed by bootstrap.sh via requirements.yml.
# This task is a safety net for direct playbook runs — note that collections
# installed mid-run are only available on the next run.

- name: Ensure Ansible collections from requirements.yml are installed
  ansible.builtin.command: ansible-galaxy collection install -r "{{ playbook_dir }}/requirements.yml"
  register: collection_install_result
  changed_when: "'Installing' in collection_install_result.stdout"

- name: Check if 1Password desktop app is installed
  ansible.builtin.command: brew list --cask 1password
  register: onepassword_app_check
  changed_when: false
  failed_when: false

- name: Install 1Password desktop app
  ansible.builtin.command: brew install --cask 1password
  when: onepassword_app_check.rc != 0
  changed_when: true

- name: Check if 1Password CLI is installed
  ansible.builtin.command: brew list --cask 1password-cli
  register: onepassword_cli_check
  changed_when: false
  failed_when: false

- name: Install 1Password CLI
  ansible.builtin.command: brew install --cask 1password-cli
  when: onepassword_cli_check.rc != 0
  changed_when: true

- name: Verify 1Password CLI is authenticated
  ansible.builtin.command: op whoami
  register: op_auth_check
  changed_when: false
  failed_when: false

- name: Fail if 1Password CLI is not signed in
  ansible.builtin.fail:
    msg: >-
      1Password CLI is not signed in.
      Run 'eval "$(op signin)"' and then re-run the playbook.
  when: op_auth_check.rc != 0
