---
# roles/onepassword/defaults/main.yml
# Headless 1Password access for the dev server. A service-account token lets
# `op read` resolve secrets (e.g. the mise GH_TOKEN/GREPTILE_API_KEY) over SSH
# with no GUI / desktop-app unlock.

# Where the token env file is written (mode 0600).
op_service_account_env: "{{ xdg_config_home }}/op/service-account.env"
