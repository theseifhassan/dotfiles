---
# roles/dmg/tasks/main.yml
# GUI apps installed from official DMG releases (not Homebrew casks). The shared
# download/mount/copy/de-quarantine/unmount logic lives in install.yml; each app
# below supplies its own data and tag, so a single app can be targeted, e.g.:
#   ansible-playbook playbook-server.yml -t raycast   # just Raycast
#   ansible-playbook playbook-server.yml -t dmg       # all of the below

- name: Gather Town
  ansible.builtin.include_tasks:
    file: install.yml
    apply:
      tags: [dmg, gather]
  vars:
    dmg_name: "Gather Town"
    dmg_app: "/Applications/GatherV2.app"
    dmg_url: "https://api.v2.gather.town/api/v2/releases/latest/macos/v2"
    dmg_slug: "gather"
  tags: [dmg, gather]

- name: Wispr Flow
  ansible.builtin.include_tasks:
    file: install.yml
    apply:
      tags: [dmg, wisprflow]
  vars:
    dmg_name: "Wispr Flow"
    dmg_app: "/Applications/Wispr Flow.app"
    dmg_url: "https://dl.wisprflow.ai/mac-apple/latest"
    dmg_slug: "wispr_flow"
  tags: [dmg, wisprflow]

- name: Raycast Beta
  ansible.builtin.include_tasks:
    file: install.yml
    apply:
      tags: [dmg, raycast]
  vars:
    dmg_name: "Raycast Beta"
    dmg_app: "/Applications/Raycast Beta.app"
    dmg_url: "{{ raycast_dmg_url }}"
    dmg_slug: "raycast"
  tags: [dmg, raycast]

- name: Alcove
  ansible.builtin.include_tasks:
    file: install.yml
    apply:
      tags: [dmg, alcove]
  vars:
    dmg_name: "Alcove"
    dmg_app: "/Applications/Alcove.app"
    dmg_url: "https://download.tryalcove.com/Alcove.dmg"
    dmg_slug: "alcove"
  tags: [dmg, alcove]
