---
# roles/tailscale/defaults/main.yml
# Tailscale joins every machine to the tailnet. Every machine advertises
# Tailscale SSH, so any machine can SSH to any other in either direction.

# Enable Tailscale SSH (host acts as an SSH target authenticated by the
# tailnet — no separate sshd key management needed). On everywhere: free
# SSH between the machines is the point of the shared tailnet.
tailscale_ssh: true

# Accept subnet routes advertised by other nodes.
tailscale_accept_routes: true

# Friendly device name on the tailnet (MagicDNS hostname). Defaults to the
# machine's LocalHostName, which the role looks up itself.
tailscale_hostname: "{{ tailscale_local_hostname }}"

# Optional reusable auth key for non-interactive login. Prefer storing this in
# group_vars/all/vault.yml as `vault_tailscale_authkey` and referencing it here.
# When empty, the role prints the interactive `tailscale up` command to run.
tailscale_authkey: "{{ vault_tailscale_authkey | default('') }}"

# Extra flags appended to `tailscale up` (e.g. "--advertise-exit-node").
tailscale_extra_args: ""
