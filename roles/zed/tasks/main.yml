---
# roles/zed/tasks/main.yml
# Installs Zed editor via Homebrew cask and deploys its configuration
# to the XDG config path.
# Zed natively respects XDG_CONFIG_HOME — the xdg role already sets it.

- name: Install Zed
  community.general.homebrew_cask:
    name: zed
    state: present

- name: Create Zed config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zed"
    state: directory
    mode: "0700"

- name: Deploy Zed settings
  ansible.builtin.copy:
    src: settings.json
    dest: "{{ xdg_config_home }}/zed/settings.json"
    mode: "0644"
