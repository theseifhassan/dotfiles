---
# roles/zed/tasks/main.yml
# Installs Zed editor via Homebrew cask and deploys its configuration
# to the XDG config path.
# Zed natively respects XDG_CONFIG_HOME — the xdg role already sets it.
#
# Config files are deployed as copies, not symlinks: playbooks may run from
# throwaway git worktrees, and a symlink into one leaves the live config
# dangling once that worktree is reaped. The flip side: edits made through
# Zed's own UI land in the live copy and are overwritten on the next playbook
# run — config changes belong in these repo files. backup: true keeps a
# timestamped copy of whatever gets overwritten, as a recovery net.

- name: Install Zed
  community.general.homebrew_cask:
    name: zed
    state: present

- name: Create Zed config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zed"
    state: directory
    mode: "0700"

- name: Deploy Zed settings
  ansible.builtin.copy:
    src: "{{ role_path }}/files/settings.json"
    dest: "{{ xdg_config_home }}/zed/settings.json"
    mode: "0644"
    force: true
    backup: true

- name: Deploy Zed keymap
  ansible.builtin.copy:
    src: "{{ role_path }}/files/keymap.json"
    dest: "{{ xdg_config_home }}/zed/keymap.json"
    mode: "0644"
    force: true
    backup: true
