---
# roles/claude-code/tasks/main.yml
# Installs Claude Code, configures global MCP servers with identity-switchable
# credentials, and installs standalone skills (no plugins).
# Claude Code has partial XDG support via CLAUDE_CONFIG_DIR.

- name: Install Claude Code
  community.general.homebrew_cask:
    name: claude-code
    state: latest
    path: /opt/homebrew/bin:/usr/local/bin

- name: Create Claude Code directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ xdg_config_home }}/claude"
    - "{{ xdg_config_home }}/claude/skills"

- name: Deploy Claude Code shell config
  ansible.builtin.copy:
    content: |
      export CLAUDE_CONFIG_DIR="{{ xdg_config_home }}/claude"
    dest: "{{ xdg_config_home }}/zsh/conf.d/claude-code.zsh"
    mode: "0644"

- name: Deploy Claude Code settings
  ansible.builtin.copy:
    src: settings.json
    dest: "{{ xdg_config_home }}/claude/settings.json"
    mode: "0644"

- name: Read existing $CLAUDE_CONFIG_DIR/.claude.json
  ansible.builtin.slurp:
    src: "{{ xdg_config_home }}/claude/.claude.json"
  register: claude_json_raw
  failed_when: false
  no_log: true

- name: Validate $CLAUDE_CONFIG_DIR/.claude.json is parseable
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - "import json,sys,base64; json.loads(base64.b64decode(sys.argv[1]))"
      - "{{ claude_json_raw.content }}"
  changed_when: false
  failed_when: false
  register: claude_json_valid
  when: claude_json_raw.content | default('', boolean=True) | length > 0
  no_log: true

- name: Parse existing $CLAUDE_CONFIG_DIR/.claude.json
  ansible.builtin.set_fact:
    claude_json: >-
      {{
        (claude_json_raw.content | b64decode | from_json)
        if (claude_json_valid.rc | default(1)) == 0
        else {}
      }}
  no_log: true

- name: Merge MCP servers into $CLAUDE_CONFIG_DIR/.claude.json
  ansible.builtin.copy:
    content: >-
      {{
        claude_json
        | combine({
            'mcpServers':
              (claude_json.mcpServers | default({}))
              | combine(managed_mcp_servers)
          })
        | to_nice_json(indent=2)
      }}
    dest: "{{ xdg_config_home }}/claude/.claude.json"
    mode: "0600"
  no_log: true
  vars:
    managed_mcp_servers:
      context7:
        type: http
        url: https://mcp.context7.com/mcp
        headers:
          CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"
      linear:
        type: http
        url: https://mcp.linear.app/mcp
        headers:
          Authorization: "Bearer ${LINEAR_TOKEN}"
      greptile:
        type: http
        url: https://api.greptile.com/mcp
        headers:
          Authorization: "Bearer ${GREPTILE_TOKEN}"

# Skills are markdown files (SKILL.md + references). We clone the source repos
# to XDG cache and symlink each skill into $CLAUDE_CONFIG_DIR/skills/.
# No runtime (node/npx) needed.

- name: Clone skill source repositories
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ xdg_cache_home }}/claude-skills/{{ item.name }}"
    depth: 1
    version: main
  loop:
    - name: anthropics-skills
      repo: "https://github.com/anthropics/skills.git"
    - name: figma-mcp-server-guide
      repo: "https://github.com/figma/mcp-server-guide.git"
  loop_control:
    label: "{{ item.name }}"

- name: Symlink skills into CLAUDE_CONFIG_DIR/skills
  ansible.builtin.file:
    src: "{{ xdg_cache_home }}/claude-skills/{{ item.source }}/skills/{{ item.skill }}"
    dest: "{{ xdg_config_home }}/claude/skills/{{ item.skill }}"
    state: link
  loop: "{{ claude_code_skills }}"
  loop_control:
    label: "{{ item.skill }}"
