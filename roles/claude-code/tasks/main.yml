---
# roles/claude-code/tasks/main.yml
# Installs Claude Code via Homebrew
# Claude Code has a partial XDG support via the CLAUDE_CONFIG_DIR

- name: Create Claude Code config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/claude"
    state: directory
    mode: "0700"

- name: Deploy Claude Code shell config
  ansible.builtin.copy:
    content: |
      export CLAUDE_CONFIG_DIR="{{ xdg_config_home }}/claude"
    dest: "{{ xdg_config_home }}/zsh/conf.d/claude-code.zsh"
    mode: "0644"

- name: Install Claude Code
  community.general.homebrew_cask:
    name: claude-code
    state: latest
    path: /opt/homebrew/bin:/usr/local/bin
