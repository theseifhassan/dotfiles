---
# roles/claude-code/tasks/main.yml
# Installs Claude Code via Homebrew and deploys global configuration,
# skills, and plugin marketplace settings.
# Claude Code config lives at ~/.claude/ — see https://code.claude.com/docs/en/settings

# =============================================================================
# Prerequisites
# =============================================================================

- name: Verify Homebrew is installed
  ansible.builtin.command: brew --version
  register: brew_check
  changed_when: false
  failed_when: false
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"

- name: Fail if Homebrew is not installed
  ansible.builtin.fail:
    msg: "Homebrew is not installed. Run bootstrap.sh first."
  when: brew_check.rc != 0

# =============================================================================
# Install Claude Code
# =============================================================================

- name: Install Claude Code
  community.general.homebrew_cask:
    name: claude-code
    state: present
    path: /opt/homebrew/bin:/usr/local/bin

# =============================================================================
# Configuration Directories
# =============================================================================

- name: Create Claude Code directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ ansible_user_dir }}/.claude"
    - "{{ ansible_user_dir }}/.claude/skills"
    - "{{ ansible_user_dir }}/.claude/plugins"

# =============================================================================
# Settings & Keybindings
# =============================================================================

- name: Deploy Claude Code settings
  ansible.builtin.copy:
    src: settings.json
    dest: "{{ ansible_user_dir }}/.claude/settings.json"
    mode: "0644"

- name: Deploy Claude Code keybindings
  ansible.builtin.copy:
    src: keybindings.json
    dest: "{{ ansible_user_dir }}/.claude/keybindings.json"
    mode: "0644"

# =============================================================================
# Plugin Marketplace
# =============================================================================

- name: Deploy known marketplaces config
  ansible.builtin.template:
    src: known_marketplaces.json.j2
    dest: "{{ ansible_user_dir }}/.claude/plugins/known_marketplaces.json"
    mode: "0644"

# =============================================================================
# MCP Servers
# =============================================================================

- name: Read existing ~/.claude.json
  ansible.builtin.slurp:
    src: "{{ ansible_user_dir }}/.claude.json"
  register: claude_json_raw
  failed_when: false
  no_log: true

- name: Validate ~/.claude.json is parseable
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - "import json,sys,base64; json.loads(base64.b64decode(sys.argv[1]))"
      - "{{ claude_json_raw.content }}"
  changed_when: false
  failed_when: false
  register: claude_json_valid
  when: claude_json_raw.content | default('', boolean=True) | length > 0
  no_log: true

- name: Parse existing ~/.claude.json
  ansible.builtin.set_fact:
    claude_json: >-
      {{
        (claude_json_raw.content | b64decode | from_json)
        if (claude_json_valid.rc | default(1)) == 0
        else {}
      }}
  no_log: true

- name: Merge MCP servers into ~/.claude.json
  ansible.builtin.copy:
    content: >-
      {{
        claude_json
        | combine({
            'mcpServers':
              (claude_json.mcpServers | default({}))
              | combine(managed_mcp_servers)
          })
        | to_nice_json(indent=2)
      }}
    dest: "{{ ansible_user_dir }}/.claude.json"
    mode: "0600"
  no_log: true
  vars:
    managed_mcp_servers:
      linear:
        type: http
        url: https://mcp.linear.app/mcp
        headers:
          Authorization: "Bearer ${LINEAR_API_KEY}"
      figma:
        type: http
        url: https://mcp.figma.com/mcp
        headers:
          Authorization: "Bearer ${FIGMA_TOKEN}"

- name: Ensure mise conf.d directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/mise/conf.d"
    state: directory
    mode: "0700"

- name: Deploy MCP credential env vars to mise conf.d
  # LINEAR_API_KEY and FIGMA_TOKEN are consumed by the MCP servers in ~/.claude.json.
  # GREPTILE_TOKEN is consumed by the greptile@claude-plugins-official plugin (no
  # standalone MCP server entry needed — the plugin reads from env directly).
  ansible.builtin.copy:
    content: |
      [env]
      LINEAR_API_KEY = "{{ '{{' }} exec(command='op read \"op://{{ op_vault }}/{{ op_linear_api_keys.personal.item }}/{{ op_linear_api_keys.personal.field }}\" --no-newline') {{ '}}' }}"
      FIGMA_TOKEN = "{{ '{{' }} exec(command='op read \"op://{{ op_vault }}/{{ op_figma_tokens.personal.item }}/{{ op_figma_tokens.personal.field }}\" --no-newline') {{ '}}' }}"
      GREPTILE_TOKEN = "{{ '{{' }} exec(command='op read \"op://{{ op_vault }}/{{ op_greptile_tokens.personal.item }}/{{ op_greptile_tokens.personal.field }}\" --no-newline') {{ '}}' }}"
    dest: "{{ xdg_config_home }}/mise/conf.d/mcp.toml"
    mode: "0600"

# =============================================================================
# Skills
# =============================================================================

- name: Deploy Claude Code skills
  ansible.builtin.copy:
    src: skills/
    dest: "{{ ansible_user_dir }}/.claude/skills/"
    mode: "0644"
    directory_mode: "0700"

- name: Check for shared skill sources
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.agents/skills/{{ item }}"
  register: shared_skill_sources
  loop:
    - find-skills
    - notebooklm

- name: Create shared skill symlinks
  ansible.builtin.file:
    src: "{{ item.stat.path }}"
    dest: "{{ ansible_user_dir }}/.claude/skills/{{ item.item }}"
    state: link
    force: true
  loop: "{{ shared_skill_sources.results }}"
  when: item.stat.exists
