---
# roles/neovim/tasks/main.yml
# Installs Neovim via Homebrew and deploys the LazyVim configuration.

- name: Install Neovim
  community.general.homebrew:
    name: neovim
    state: present

- name: Check if nvim config is already a symlink
  ansible.builtin.stat:
    path: "{{ xdg_config_home }}/nvim"
  register: nvim_config

- name: Remove existing nvim config directory (if not already a symlink)
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/nvim"
    state: absent
  when: nvim_config.stat.exists and not nvim_config.stat.islnk

- name: Deploy Neovim config
  ansible.builtin.file:
    src: "{{ role_path }}/files/nvim"
    dest: "{{ xdg_config_home }}/nvim"
    state: link

- name: Create Neovim data directory
  ansible.builtin.file:
    path: "{{ xdg_data_home }}/nvim"
    state: directory
    mode: "0700"
