---
# roles/zsh/tasks/main.yml
# Sets up XDG-compliant zsh configuration. Deploys ~/.zshenv (the only
# home-directory dotfile) to redirect ZDOTDIR, then creates shell config
# files under ~/.config/zsh/.

- name: Create zsh state directory for history
  ansible.builtin.file:
    path: "{{ xdg_state_home }}/zsh"
    state: directory
    mode: "0700"

- name: Create zsh cache directory for zcompdump
  ansible.builtin.file:
    path: "{{ xdg_cache_home }}/zsh"
    state: directory
    mode: "0700"

- name: Create zsh conf.d directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zsh/conf.d"
    state: directory
    mode: "0700"

- name: Remove stale starship artifacts (prompt is now native zsh)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ xdg_config_home }}/zsh/conf.d/starship.zsh"
    - "{{ xdg_config_home }}/starship.toml"

- name: Create ZDOTDIR redirect in ~/.zshenv
  ansible.builtin.copy:
    content: |
      export ZDOTDIR="{{ xdg_config_home | replace(ansible_facts['user_dir'], '$HOME') }}/zsh"
      source "$ZDOTDIR/.zshenv"
    dest: "{{ ansible_facts['user_dir'] }}/.zshenv"
    mode: "0644"

- name: Create zsh environment file
  ansible.builtin.copy:
    content: |
      # Source XDG base directory variables
      source "$ZDOTDIR/xdg.zsh"

      # Default editor: prefer Zed when it's installed and a GUI is reachable
      # (local desktop, not over SSH), otherwise fall back to neovim, then vim.
      # --wait so blocking callers like git wait for the buffer to close.
      # Guarded so an inherited EDITOR (e.g. from a parent shell) wins and
      # nested shells skip the detection entirely.
      if [[ -z "$EDITOR" ]]; then
        if command -v zed >/dev/null 2>&1 \
          && [[ -z "$SSH_CONNECTION" ]] \
          && { [[ "$OSTYPE" == darwin* ]] || [[ -n "$DISPLAY$WAYLAND_DISPLAY" ]]; }; then
          export EDITOR="zed --wait"
        elif command -v nvim >/dev/null 2>&1; then
          export EDITOR="nvim"
        else
          export EDITOR="vim"
        fi
        export VISUAL="$EDITOR"
      fi
    dest: "{{ xdg_config_home }}/zsh/.zshenv"
    mode: "0644"

- name: Create zsh interactive config
  ansible.builtin.file:
    src: "{{ role_path }}/files/.zshrc"
    dest: "{{ xdg_config_home }}/zsh/.zshrc"
    state: link
    force: true
