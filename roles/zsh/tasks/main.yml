---
# roles/zsh/tasks/main.yml
# Sets up XDG-compliant zsh configuration. Deploys ~/.zshenv (the only
# home-directory dotfile) to redirect ZDOTDIR, then creates shell config
# files under ~/.config/zsh/.

- name: Create zsh state directory for history
  ansible.builtin.file:
    path: "{{ xdg_state_home }}/zsh"
    state: directory
    mode: "0700"

- name: Create zsh cache directory for zcompdump
  ansible.builtin.file:
    path: "{{ xdg_cache_home }}/zsh"
    state: directory
    mode: "0700"

- name: Create zsh conf.d directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zsh/conf.d"
    state: directory
    mode: "0700"

- name: Create ZDOTDIR redirect in ~/.zshenv
  ansible.builtin.copy:
    content: |
      export ZDOTDIR="{{ xdg_config_home | replace(ansible_user_dir, '$HOME') }}/zsh"
      source "$ZDOTDIR/.zshenv"
    dest: "{{ ansible_user_dir }}/.zshenv"
    mode: "0644"

- name: Create zsh environment file
  ansible.builtin.copy:
    content: |
      # Source XDG base directory variables
      source "$ZDOTDIR/xdg.zsh"
    dest: "{{ xdg_config_home }}/zsh/.zshenv"
    mode: "0644"

- name: Create zsh interactive config
  ansible.builtin.copy:
    content: |
      HISTFILE="$XDG_STATE_HOME/zsh/history"
      HISTSIZE=50000
      SAVEHIST=50000

      setopt HIST_IGNORE_DUPS
      setopt HIST_IGNORE_SPACE
      setopt HIST_REDUCE_BLANKS
      setopt SHARE_HISTORY

      autoload -Uz compinit
      () {
        local -a _zcompdump=("$XDG_CACHE_HOME/zsh/zcompdump"(N.mh+24))
        if (( ${#_zcompdump} )); then
          compinit -d "$XDG_CACHE_HOME/zsh/zcompdump"
        else
          compinit -C -d "$XDG_CACHE_HOME/zsh/zcompdump"
        fi
      }

      if (( $+commands[fzf] )) && fzf --zsh &>/dev/null; then
        source <(fzf --zsh)
      fi

      for conf in "$ZDOTDIR"/conf.d/*.zsh(N); do
        source "$conf"
      done
    dest: "{{ xdg_config_home }}/zsh/.zshrc"
    mode: "0644"
