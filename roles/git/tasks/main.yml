---
# roles/git/tasks/main.yml
# Installs Git via Homebrew and deploys the git config under XDG with the
# machine's single profile identity (one profile per machine — no includeIf
# routing). GitHub CLI + Graphite are installed on every machine.

- name: Install git via Homebrew
  community.general.homebrew:
    name: git
    state: latest

- name: Create git config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/git"
    state: directory
    mode: "0700"

- name: Deploy git config
  ansible.builtin.template:
    src: config.j2
    dest: "{{ xdg_config_home }}/git/config"
    mode: "0600"

- name: Install gh via Homebrew
  community.general.homebrew:
    name: gh
    state: latest

- name: Tap withgraphite/tap Homebrew repository
  community.general.homebrew_tap:
    name: withgraphite/tap
    state: present

- name: Install Graphite CLI via Homebrew
  community.general.homebrew:
    name: withgraphite/tap/graphite
    state: latest

- name: Create Graphite config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/graphite"
    state: directory
    mode: "0700"

- name: Deploy Graphite user config
  ansible.builtin.template:
    src: graphite-user-config.json.j2
    dest: "{{ xdg_config_home }}/graphite/user_config"
    mode: "0600"
