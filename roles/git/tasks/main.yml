---
# roles/git/tasks/main.yml
# Installs Git via Homebrew and deploys a config under XDG with includeIf
# directives for automatic identity switching based on project directory.

- name: Install git via Homebrew
  community.general.homebrew:
    name: git
    state: latest
    path: "/opt/homebrew/bin:/usr/local/bin"

- name: Assert git identity placeholders have been replaced
  ansible.builtin.assert:
    that:
      - git_identity.work.name != "WORK_NAME_PLACEHOLDER"
      - git_identity.work.email != "WORK_EMAIL_PLACEHOLDER"
      - git_identity.personal.name != "PERSONAL_NAME_PLACEHOLDER"
      - git_identity.personal.email != "PERSONAL_EMAIL_PLACEHOLDER"
    fail_msg: >-
      Replace the placeholder values in group_vars/all.yml before running
      the git role.

- name: Create git config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/git"
    state: directory
    mode: "0700"

- name: Deploy git config
  ansible.builtin.template:
    src: config.j2
    dest: "{{ xdg_config_home }}/git/config"
    mode: "0600"

- name: Deploy git work identity config
  ansible.builtin.template:
    src: config-work.j2
    dest: "{{ xdg_config_home }}/git/config-work"
    mode: "0600"

- name: Deploy git personal identity config
  ansible.builtin.template:
    src: config-personal.j2
    dest: "{{ xdg_config_home }}/git/config-personal"
    mode: "0600"
