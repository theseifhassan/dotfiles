---
# roles/ssh/tasks/main.yml
# Provisions SSH keys from Ansible Vault and deploys the SSH config. Each
# machine gets ONLY its profile's key material, deployed as id_ed25519_github
# (one profile per machine — the vault holds both profiles' keys, but
# cross-profile credentials never land on a machine). Inter-machine SSH is authenticated by Tailscale SSH (tailnet
# identity, no key files), so there are no per-machine keys.

- name: Create SSH directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.ssh"
    state: directory
    mode: "0700"

# One key file per machine, named for its job — the profile only selects
# which vault material lands in it.
- name: Provision GitHub SSH private key
  ansible.builtin.copy:
    content: "{{ vault_ssh_key[profile].private_key }}\n"
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519_github"
    mode: "0600"
  no_log: true

- name: Provision GitHub SSH public key
  ansible.builtin.copy:
    content: "{{ vault_ssh_key[profile].public_key }}\n"
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519_github.pub"
    mode: "0644"

# Dual-profile-era filenames (the profile qualifier disambiguated two keys
# on one machine; obsolete since #71/#88).
- name: Remove retired per-profile key files
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.ssh/{{ item }}"
    state: absent
  loop:
    - id_ed25519_personal
    - id_ed25519_personal.pub
    - id_ed25519_work
    - id_ed25519_work.pub

- name: Deploy SSH config
  ansible.builtin.template:
    src: config.j2
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/config"
    mode: "0600"
    validate: "ssh -F %s -G localhost"

# Inbound peer access: plain sshd + the peer profile's key, because the
# Tailscale SSH server is broken in the macOS open-source build
# (tailscale/tailscale#18957). The tailnet still provides the network.
- name: Authorize peer machine's profile key
  ansible.posix.authorized_key:
    user: "{{ ansible_facts['user_dir'] | basename }}"
    key: "{{ ssh_peer_authorized_key }}"
    state: present

- name: Read Remote Login state
  ansible.builtin.command:
    cmd: systemsetup -getremotelogin
  become: true
  register: ssh_remotelogin
  changed_when: false
  check_mode: false # read-only probe; must run even during --check

- name: Enable Remote Login (sshd)
  ansible.builtin.command:
    cmd: systemsetup -setremotelogin on
  become: true
  when: "'On' not in ssh_remotelogin.stdout"
  changed_when: true
