---
# roles/ssh/tasks/main.yml
# Provisions SSH keys from Ansible Vault and deploys an SSH config with
# host aliases for identity-based routing.

- name: Create SSH directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.ssh"
    state: directory
    mode: "0700"

- name: Provision SSH private keys
  ansible.builtin.copy:
    content: "{{ vault_ssh_keys[item].private_key }}\n"
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519_{{ item }}"
    mode: "0600"
  loop: "{{ vault_ssh_keys | list }}"
  no_log: true

- name: Provision SSH public keys
  ansible.builtin.copy:
    content: "{{ vault_ssh_keys[item].public_key }}\n"
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519_{{ item }}.pub"
    mode: "0644"
  loop: "{{ vault_ssh_keys | list }}"

- name: Get machine hostname
  ansible.builtin.command:
    cmd: scutil --get LocalHostName
  register: hostname_result
  changed_when: false

- name: Set machine hostname fact
  ansible.builtin.set_fact:
    machine_hostname: "{{ hostname_result.stdout }}"

- name: Provision machine SSH private key
  ansible.builtin.copy:
    content: "{{ vault_machine_ssh_keys[machine_hostname].private_key }}\n"
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519_{{ machine_hostname }}"
    mode: "0600"
  no_log: true
  when: machine_hostname in vault_machine_ssh_keys

- name: Provision machine SSH public key
  ansible.builtin.copy:
    content: "{{ vault_machine_ssh_keys[machine_hostname].public_key }}\n"
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519_{{ machine_hostname }}.pub"
    mode: "0644"
  when: machine_hostname in vault_machine_ssh_keys

- name: Deploy SSH config
  ansible.builtin.template:
    src: config.j2
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/config"
    mode: "0600"
    validate: "ssh -F %s -G localhost"
