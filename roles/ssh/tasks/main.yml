---
# roles/ssh/tasks/main.yml
# Provisions SSH keys from Ansible Vault and deploys the SSH config. Each
# machine gets ONLY its profile's key (one profile per machine) — the vault
# may hold every profile's keys, but cross-profile credentials never land on
# a machine. Inter-machine SSH is authenticated by Tailscale SSH (tailnet
# identity, no key files), so there are no per-machine keys.

- name: Create SSH directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.ssh"
    state: directory
    mode: "0700"

- name: Provision profile SSH private key
  ansible.builtin.copy:
    content: "{{ vault_ssh_keys[profile].private_key }}\n"
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519_{{ profile }}"
    mode: "0600"
  no_log: true

- name: Provision profile SSH public key
  ansible.builtin.copy:
    content: "{{ vault_ssh_keys[profile].public_key }}\n"
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519_{{ profile }}.pub"
    mode: "0644"

- name: Deploy SSH config
  ansible.builtin.template:
    src: config.j2
    dest: "{{ ansible_facts['user_dir'] }}/.ssh/config"
    mode: "0600"
    validate: "ssh -F %s -G localhost"
