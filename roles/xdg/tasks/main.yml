---
# roles/xdg/tasks/main.yml
# Creates XDG base directories, redirects tools to XDG paths,
# and cleans up stale dotfiles from the home directory.

- name: Create XDG config home directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}"
    state: directory
    mode: "0700"

# Mode 0700 is intentional — this is a single-user workstation.
# Standard convention is 0755, but we restrict traversal to owner only.
- name: Create .local parent directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.local"
    state: directory
    mode: "0700"

- name: Create XDG data home directory
  ansible.builtin.file:
    path: "{{ xdg_data_home }}"
    state: directory
    mode: "0700"

- name: Create XDG state home directory
  ansible.builtin.file:
    path: "{{ xdg_state_home }}"
    state: directory
    mode: "0700"

- name: Create XDG cache home directory
  ansible.builtin.file:
    path: "{{ xdg_cache_home }}"
    state: directory
    mode: "0700"

- name: Create zsh config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zsh"
    state: directory
    mode: "0700"

- name: Generate XDG environment file for zsh
  ansible.builtin.copy:
    content: |
      export XDG_CONFIG_HOME="{{ xdg_config_home | replace(ansible_facts['user_dir'], '$HOME') }}"
      export XDG_DATA_HOME="{{ xdg_data_home | replace(ansible_facts['user_dir'], '$HOME') }}"
      export XDG_STATE_HOME="{{ xdg_state_home | replace(ansible_facts['user_dir'], '$HOME') }}"
      export XDG_CACHE_HOME="{{ xdg_cache_home | replace(ansible_facts['user_dir'], '$HOME') }}"

      # Redirect tools that don't follow XDG by default
      export ANSIBLE_HOME="$XDG_DATA_HOME/ansible"
      export NPM_CONFIG_CACHE="$XDG_CACHE_HOME/npm"
      export DOLT_ROOT_DIR="$XDG_DATA_HOME/dolt"

      # Prevent macOS from creating ~/.zsh_sessions
      export SHELL_SESSIONS_DISABLE=1
    dest: "{{ xdg_config_home }}/zsh/xdg.zsh"
    mode: "0644"

- name: Remove stale dotfiles from home directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/{{ item }}"
    state: absent
  loop:
    - .ansible
    - .npm
    - .dolt
    - .next-devtools-mcp
    - .zsh_history
    - .zsh_sessions
    - .claude
