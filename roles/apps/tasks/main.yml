---
# roles/apps/tasks/main.yml
# Plain per-app installs — GUI casks and loose developer CLIs alike — for
# anything with no config or install logic of its own. Each app gets its own
# tag so a single one can still be targeted, e.g.:
#   ansible-playbook site.yml -t slack   # just Slack
#   ansible-playbook site.yml -t apps    # all of the below
# Profile-specific apps carry a `when` guard (slack work-only, discord
# personal-only). Apps with real logic (wisprflow, raycast, obs, zed, ...)
# keep their own dedicated roles; non-Homebrew GUI installs live in `dmg`.

# --- GUI applications -------------------------------------------------------

- name: Install Google Chrome
  community.general.homebrew_cask:
    name: google-chrome
    state: latest
  tags: [apps, chrome]

- name: Install Notion
  community.general.homebrew_cask:
    name: notion
    state: latest
  tags: [apps, notion]

- name: Install Slack
  community.general.homebrew_cask:
    name: slack
    state: latest
  tags: [apps, slack]
  when: profile == "work"

- name: Install Figma
  community.general.homebrew_cask:
    name: figma
    state: latest
  tags: [apps, figma]

- name: Install Linear
  community.general.homebrew_cask:
    name: linear-linear
    state: latest
  tags: [apps, linear]

- name: Install Discord
  community.general.homebrew_cask:
    name: discord
    state: latest
  tags: [apps, discord]
  when: profile == "personal"

- name: Install DataGrip
  community.general.homebrew_cask:
    name: datagrip
    state: latest
  tags: [apps, datagrip]

- name: Install 1Password
  community.general.homebrew_cask:
    name: 1password
    state: present
  tags: [apps, 1password]

# --- Developer CLIs ---------------------------------------------------------

- name: Install Lazygit
  community.general.homebrew:
    name: lazygit
    state: latest
  tags: [apps, lazygit]

- name: Install ripgrep
  community.general.homebrew:
    name: ripgrep
    state: latest
  tags: [apps, ripgrep]

- name: Install Google Cloud CLI
  community.general.homebrew_cask:
    name: gcloud-cli
    state: latest
  tags: [apps, gcloud]

- name: Install Google Workspace CLI
  community.general.homebrew:
    name: googleworkspace-cli
    state: latest
  tags: [apps, gws]

# The old gcloud/gws multi-account wrappers are gone — one profile per
# machine means no account switching; the CLIs install plain. Remove the
# dangling conf.d symlinks the wrappers left behind.
- name: Remove retired gcloud/gws account wrappers
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zsh/conf.d/{{ item }}"
    state: absent
  loop:
    - gws.zsh
    - gcloud.zsh
  tags: [apps]
