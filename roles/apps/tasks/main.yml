---
# roles/apps/tasks/main.yml
# Server-only developer CLI tools installed via Homebrew. GUI apps live in
# their own roles (chrome, zed, slack, ...); this role is just the loose CLIs
# that don't warrant a role of their own.

- name: Install Lazygit
  community.general.homebrew:
    name: lazygit
    state: latest

- name: Install ripgrep
  community.general.homebrew:
    name: ripgrep
    state: latest

- name: Install Google Cloud CLI
  community.general.homebrew_cask:
    name: gcloud-cli
    state: latest

- name: Install Google Workspace CLI
  community.general.homebrew:
    name: googleworkspace-cli
    state: latest

- name: Deploy gws multi-account wrapper
  ansible.builtin.file:
    src: "{{ role_path }}/files/gws.zsh"
    dest: "{{ xdg_config_home }}/zsh/conf.d/gws.zsh"
    state: link
    force: true

- name: Deploy gcloud multi-account wrapper
  ansible.builtin.file:
    src: "{{ role_path }}/files/gcloud.zsh"
    dest: "{{ xdg_config_home }}/zsh/conf.d/gcloud.zsh"
    state: link
    force: true
