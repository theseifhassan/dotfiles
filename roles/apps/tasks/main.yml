---
# roles/apps/tasks/main.yml
# Server-only developer CLI tools installed via Homebrew. GUI apps live in
# their own roles (chrome, zed, slack, ...); this role is just the loose CLIs
# that don't warrant a role of their own.

- name: Install Lazygit
  community.general.homebrew:
    name: lazygit
    state: latest

- name: Install ripgrep
  community.general.homebrew:
    name: ripgrep
    state: latest

- name: Install Google Cloud CLI
  community.general.homebrew_cask:
    name: gcloud-cli
    state: latest

- name: Install Google Workspace CLI
  community.general.homebrew:
    name: googleworkspace-cli
    state: latest

# The old gcloud/gws multi-account wrappers are gone — one profile per
# machine means no account switching; the CLIs install plain. Remove the
# dangling symlinks the wrappers left behind.
- name: Remove retired gcloud/gws account wrappers
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zsh/conf.d/{{ item }}"
    state: absent
  loop:
    - gws.zsh
    - gcloud.zsh
