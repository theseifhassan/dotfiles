---
# roles/apps/tasks/main.yml
# Per-app installs — GUI casks, loose developer CLIs, and apps shipped as
# official DMG releases (via the shared dmg-install.yml routine). Each app
# gets its own tag so a single one can still be targeted, e.g.:
#   ansible-playbook site.yml -t slack   # just Slack
#   ansible-playbook site.yml -t apps    # all of the below
# Profile-specific apps carry a `when` guard (slack + gather work-only,
# discord personal-only). Apps with real config (obs, zed, ghostty, ...)
# keep their own dedicated roles.

# --- GUI applications (Homebrew casks) --------------------------------------

- name: Install Google Chrome
  community.general.homebrew_cask:
    name: google-chrome
    state: latest
  tags: [apps, chrome]

- name: Install Notion
  community.general.homebrew_cask:
    name: notion
    state: latest
  tags: [apps, notion]

- name: Install Slack
  community.general.homebrew_cask:
    name: slack
    state: latest
  tags: [apps, slack]
  when: profile == "work"

- name: Install Figma
  community.general.homebrew_cask:
    name: figma
    state: latest
  tags: [apps, figma]

- name: Install Linear
  community.general.homebrew_cask:
    name: linear-linear
    state: latest
  tags: [apps, linear]

- name: Install Discord
  community.general.homebrew_cask:
    name: discord
    state: latest
  tags: [apps, discord]
  when: profile == "personal"

- name: Install DataGrip
  community.general.homebrew_cask:
    name: datagrip
    state: latest
  tags: [apps, datagrip]

- name: Install 1Password
  community.general.homebrew_cask:
    name: 1password
    state: present
  tags: [apps, 1password]

# --- GUI applications (official DMG releases) -------------------------------

- name: Gather Town
  ansible.builtin.include_tasks:
    file: dmg-install.yml
    apply:
      tags: [apps, gather]
  vars:
    dmg_name: "Gather Town"
    dmg_app: "/Applications/GatherV2.app"
    dmg_url: "https://api.v2.gather.town/api/v2/releases/latest/macos/v2"
    dmg_slug: "gather"
  tags: [apps, gather]
  when: profile == "work"

- name: Wispr Flow
  ansible.builtin.include_tasks:
    file: dmg-install.yml
    apply:
      tags: [apps, wisprflow]
  vars:
    dmg_name: "Wispr Flow"
    dmg_app: "/Applications/Wispr Flow.app"
    dmg_url: "https://dl.wisprflow.ai/mac-apple/latest"
    dmg_slug: "wispr_flow"
  tags: [apps, wisprflow]

- name: Raycast Beta
  ansible.builtin.include_tasks:
    file: dmg-install.yml
    apply:
      tags: [apps, raycast]
  vars:
    dmg_name: "Raycast Beta"
    dmg_app: "/Applications/Raycast Beta.app"
    dmg_url: "{{ raycast_dmg_url }}"
    dmg_slug: "raycast"
  tags: [apps, raycast]

- name: Alcove
  ansible.builtin.include_tasks:
    file: dmg-install.yml
    apply:
      tags: [apps, alcove]
  vars:
    dmg_name: "Alcove"
    dmg_app: "/Applications/Alcove.app"
    dmg_url: "https://download.tryalcove.com/Alcove.dmg"
    dmg_slug: "alcove"
  tags: [apps, alcove]

# --- Developer CLIs ---------------------------------------------------------

# Claude Code ships via its own curl installer (no cask/DMG). settings.json
# is hand-managed (models, plugins, notification prefs) and CLAUDE_CONFIG_DIR
# lives in the global mise [env], so install + config dirs is all there is.
- name: Install Claude Code
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
  changed_when: true
  tags: [apps, claude]

- name: Create Claude Code directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ xdg_config_home }}/claude"
    - "{{ xdg_config_home }}/claude/skills"
  tags: [apps, claude]

- name: Install Lazygit
  community.general.homebrew:
    name: lazygit
    state: latest
  tags: [apps, lazygit]

- name: Install ripgrep
  community.general.homebrew:
    name: ripgrep
    state: latest
  tags: [apps, ripgrep]

- name: Install Google Cloud CLI
  community.general.homebrew_cask:
    name: gcloud-cli
    state: latest
  tags: [apps, gcloud]

- name: Install Google Workspace CLI
  community.general.homebrew:
    name: googleworkspace-cli
    state: latest
  tags: [apps, gws]

# The old gcloud/gws multi-account wrappers are gone — one profile per
# machine means no account switching; the CLIs install plain. Remove the
# dangling conf.d symlinks the wrappers left behind.
- name: Remove retired gcloud/gws account wrappers
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zsh/conf.d/{{ item }}"
    state: absent
  loop:
    - gws.zsh
    - gcloud.zsh
  tags: [apps]

# The Claude Code worktree-open hook is retired: hooks are no longer attached
# to Claude. settings.json is otherwise hand-managed, so the entry the old
# claude role used to own is stripped rather than the file being templated:
# only hook commands pointing at the retired script are removed, everything
# else is preserved, and empty hook containers left behind are pruned. The
# write is atomic (temp file + rename) so an interrupted run can't truncate
# the live settings; an unparseable settings file fails loudly with its path
# rather than being clobbered.
- name: Remove retired Claude Code worktree-open hook from settings
  ansible.builtin.shell:
    cmd: |
      python3 - "{{ xdg_config_home }}/claude/settings.json" \
                "{{ claude_worktree_hook }}" <<'PY'
      import json, os, sys, tempfile

      settings_path, hook_command = sys.argv[1], sys.argv[2]
      if not os.path.exists(settings_path):
          print("OK")
          sys.exit(0)
      try:
          with open(settings_path) as f:
              settings = json.load(f)
      except (json.JSONDecodeError, UnicodeDecodeError) as err:
          sys.stderr.write(
              f"refusing to touch {settings_path}: not valid JSON ({err}); "
              "fix or remove the file, then re-run\n"
          )
          sys.exit(1)

      changed = False
      matchers = settings.get("hooks", {}).get("PostToolUse", [])
      for entry in matchers:
          commands = entry.get("hooks", [])
          kept = [h for h in commands if h.get("command") != hook_command]
          if len(kept) != len(commands):
              entry["hooks"] = kept
              changed = True
      if changed:
          matchers = [m for m in matchers if m.get("hooks")]
          if matchers:
              settings["hooks"]["PostToolUse"] = matchers
          else:
              settings["hooks"].pop("PostToolUse", None)
          if not settings["hooks"]:
              settings.pop("hooks")
          fd, tmp_path = tempfile.mkstemp(
              dir=os.path.dirname(settings_path) or ".", suffix=".tmp"
          )
          with os.fdopen(fd, "w") as f:
              json.dump(settings, f, indent=2)
              f.write("\n")
          os.replace(tmp_path, settings_path)
          print("CHANGED")
      else:
          print("OK")
      PY
  register: claude_hook_removal
  changed_when: "'CHANGED' in claude_hook_removal.stdout"
  tags: [apps, claude]

- name: Remove retired Claude Code hooks directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/claude/hooks"
    state: absent
  tags: [apps, claude]

# CLAUDE_CONFIG_DIR moved to the global mise [env] — mise owns all env vars.
- name: Remove retired Claude Code shell config
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zsh/conf.d/claude-code.zsh"
    state: absent
  tags: [apps, claude]
