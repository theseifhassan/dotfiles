---
# roles/server/tasks/main.yml
# Server-only. Configures macOS so a headless Mac mini stays up 24/7: never
# sleeps, spins nothing down, and recovers automatically after a power loss.
# Requires elevated privileges. ansible_become_password is wired from
# vault_sudo_password (group_vars), so --ask-vault-pass alone is sufficient.

- name: Read current pmset configuration
  ansible.builtin.command:
    cmd: pmset -g custom
  register: pmset_current
  changed_when: false
  check_mode: false # read-only probe; must run even during --check

- name: Apply always-on power settings
  ansible.builtin.command:
    cmd: "pmset -a {{ item.key }} {{ item.value }}"
  become: true
  loop: "{{ server_power_settings | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  changed_when: true
  when: >-
    (item.key ~ ' ' ~ item.value) not in
    (pmset_current.stdout | regex_replace('[ \t]+', ' '))

- name: Set display sleep timer
  ansible.builtin.command:
    cmd: "pmset -a displaysleep {{ server_display_sleep_minutes }}"
  become: true
  changed_when: true
  when: "('displaysleep ' ~ server_display_sleep_minutes) not in (pmset_current.stdout | regex_replace('[ \t]+', ' '))"

- name: Disable system sleep via systemsetup (belt and suspenders)
  ansible.builtin.command:
    cmd: systemsetup -setcomputersleep Never
  become: true
  register: systemsetup_sleep
  changed_when: "'Never' not in systemsetup_sleep.stdout"
  failed_when: false
