---
# roles/starship/tasks/main.yml
# Installs Starship via Homebrew and deploys a minimal prompt config that
# produces: user@host:working_dir [git_branch_name]

- name: Install Starship via Homebrew
  community.general.homebrew:
    name: starship
    state: present
    path: "/opt/homebrew/bin:/usr/local/bin"

- name: Deploy Starship config
  ansible.builtin.copy:
    src: starship.toml
    dest: "{{ xdg_config_home }}/starship.toml"
    mode: "0644"

- name: Deploy Starship zsh init hook
  ansible.builtin.copy:
    src: starship.zsh
    dest: "{{ xdg_config_home }}/zsh/conf.d/starship.zsh"
    mode: "0644"
