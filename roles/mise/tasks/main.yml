---
# roles/mise/tasks/main.yml
# Installs mise via Homebrew, deploys global config under XDG, activates it in
# zsh, and deploys per-identity .mise.toml files into project directories for
# automatic credential switching based on working directory.
# mise natively respects XDG_CONFIG_HOME.

- name: Install mise via Homebrew
  community.general.homebrew:
    name: mise
    state: latest
    path: "/opt/homebrew/bin:/usr/local/bin"

- name: Create mise config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/mise"
    state: directory
    mode: "0700"

- name: Deploy mise config
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ xdg_config_home }}/mise/config.toml"
    mode: "0644"

- name: Deploy mise activation to zsh
  ansible.builtin.copy:
    content: |
      # mise — version manager (https://mise.jdx.dev)
      if (( $+commands[mise] )); then
        eval "$(mise activate zsh)"
      fi
    dest: "{{ xdg_config_home }}/zsh/conf.d/mise.zsh"
    mode: "0644"

- name: Deploy per-identity mise env configs
  ansible.builtin.template:
    src: mise-identity.toml.j2
    dest: "{{ project_dirs[item] }}/.mise.toml"
    mode: "0600"
  loop: "{{ identity_profiles }}"
  vars:
    identity: "{{ item }}"
  no_log: true

- name: Mark per-identity mise configs as trusted
  ansible.builtin.command:
    argv:
      - mise
      - trust
      - "{{ project_dirs[item] }}/.mise.toml"
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"
  loop: "{{ identity_profiles }}"
  changed_when: false
