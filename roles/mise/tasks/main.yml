---
# roles/mise/tasks/main.yml
# Installs mise via Homebrew, deploys global config under XDG, and activates
# it in zsh so per-project .mise.toml files are automatically respected.
# mise natively respects XDG_CONFIG_HOME.

# =============================================================================
# Prerequisites
# =============================================================================

- name: Verify Homebrew is installed
  ansible.builtin.command: brew --version
  register: brew_check
  changed_when: false
  failed_when: false
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"

- name: Fail if Homebrew is not installed
  ansible.builtin.fail:
    msg: "Homebrew is not installed. Run bootstrap.sh first."
  when: brew_check.rc != 0

# =============================================================================
# Install
# =============================================================================

- name: Install mise via Homebrew
  community.general.homebrew:
    name: mise
    state: present
    path: "/opt/homebrew/bin:/usr/local/bin"

# =============================================================================
# Configuration
# =============================================================================

- name: Create mise config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/mise"
    state: directory
    mode: "0700"

- name: Deploy mise config
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ xdg_config_home }}/mise/config.toml"
    mode: "0644"

# =============================================================================
# Shell Integration
# =============================================================================

- name: Ensure zsh conf.d directory exists  # defensive: allows -t mise to run standalone
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/zsh/conf.d"
    state: directory
    mode: "0700"

- name: Deploy mise activation to zsh
  ansible.builtin.copy:
    content: |
      # mise — version manager (https://mise.jdx.dev)
      if (( $+commands[mise] )); then
        eval "$(mise activate zsh)"
      fi
    dest: "{{ xdg_config_home }}/zsh/conf.d/mise.zsh"
    mode: "0644"
