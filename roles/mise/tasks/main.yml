---
# roles/mise/tasks/main.yml
# Installs mise via Homebrew, deploys global config under XDG, renders profile
# secrets from the vault, and activates mise in zsh. mise natively respects
# XDG_CONFIG_HOME.

- name: Install mise via Homebrew
  community.general.homebrew:
    name: mise
    state: latest

- name: Create mise config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/mise"
    state: directory
    mode: "0700"

# Deployed as a copy, not a symlink: playbooks may run from throwaway git
# worktrees, and a symlink into one dangles once that worktree is reaped —
# taking the global env (SAW_WORKTREE_ROOT, GRAPHITE_PROFILE, secrets.env
# sourcing) and tool list with it.
- name: Deploy mise config
  ansible.builtin.copy:
    src: "{{ role_path }}/files/config.toml"
    dest: "{{ xdg_config_home }}/mise/config.toml"
    mode: "0644"
    force: true

- name: Render personal profile secrets
  ansible.builtin.template:
    src: secrets.env.j2
    dest: "{{ xdg_config_home }}/mise/secrets.env"
    mode: "0600"

- name: Remove retired presets link
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/mise/presets"
    state: absent

- name: Deploy mise activation to zsh
  ansible.builtin.copy:
    content: |
      # mise — version manager (https://mise.jdx.dev)
      if (( $+commands[mise] )); then
        eval "$(mise activate zsh)"
      fi
    dest: "{{ xdg_config_home }}/zsh/conf.d/mise.zsh"
    mode: "0644"
