---
# roles/mise/tasks/main.yml
# Installs mise via Homebrew, deploys global config under XDG, renders profile
# secrets from the vault, and activates mise in zsh. mise natively respects
# XDG_CONFIG_HOME.

- name: Install mise via Homebrew
  community.general.homebrew:
    name: mise
    state: latest

- name: Create mise config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/mise"
    state: directory
    mode: "0700"

# Deployed as a rendered file, not a symlink: playbooks may run from
# throwaway git worktrees, and a symlink into one dangles once that worktree
# is reaped — taking the global env and tool list with it. Mode 0600: the
# rendered config carries the profile secrets inline.
- name: Deploy mise config
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ xdg_config_home }}/mise/config.toml"
    mode: "0600"
    force: true

# Secrets moved inline into config.toml; presets predate that.
- name: Remove retired mise artifacts
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/mise/{{ item }}"
    state: absent
  loop:
    - presets
    - secrets.env

- name: Deploy mise activation to zsh
  ansible.builtin.copy:
    content: |
      # mise — version manager (https://mise.jdx.dev)
      if (( $+commands[mise] )); then
        eval "$(mise activate zsh)"
      fi
    dest: "{{ xdg_config_home }}/zsh/conf.d/mise.zsh"
    mode: "0644"
