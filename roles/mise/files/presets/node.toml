# node preset — scaffold with `mise run init node`
# Pins the project toolchain. The shared env vars (GH_TOKEN, GREPTILE_API_KEY,
# GRAPHITE_PROFILE) come from the global config, and gh/gt/lazygit are installed
# globally via Homebrew (git + apps roles), so they're intentionally not here.

[tools]
node = "lts"
pnpm = "latest"

[tasks.dev]
description = "Start the dev server"
run = "pnpm dev"

[tasks.build]
description = "Build the project"
run = "pnpm build"

[tasks.test]
description = "Run tests"
run = "pnpm test"

[tasks.lint]
description = "Lint the project"
run = "pnpm lint"
