# mise configuration — global defaults (symlinked from the repo; no secrets).
#
# Personal env only: secrets.env is rendered from the vault by the mise role
# (mode 0600, never committed). Work projects are deliberately NOT managed by
# these dotfiles — work env is whatever the work project/machine provides, and
# Claude Code routing to the work instance is handled by the claude role's
# claudius guardrail (git-remote based), not by mise.

[env]
GRAPHITE_PROFILE = "personal"
_.file = "~/.config/mise/secrets.env"

# Global tools. The Node-based language servers + formatters here are consumed
# by Neovim (the `neovim` role enables them via the native vim.lsp API and
# conform.nvim). They live in the global mise config — rather than being
# installed imperatively — so the declaration is version-controlled and `mise
# install` realizes them without rewriting this file. `node` provides the
# runtime for mise's npm backend.
[tools]
node = "lts"
pnpm = "latest"
bun = "latest"
