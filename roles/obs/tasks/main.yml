---
- module_defaults:
    community.general.homebrew_cask:
      path: /opt/homebrew/bin:/usr/local/bin
  block:
    - name: Install OBS Studio
      community.general.homebrew_cask:
        name: obs
        state: present

    - name: Install DroidCam OBS Plugin
      community.general.homebrew_cask:
        name: droidcam-obs
        state: present
        sudo_password: "{{ ansible_become_password }}"

- name: Create user OBS Studio plugins directory
  ansible.builtin.file:
    path: ~/Library/Application Support/obs-studio/plugins
    state: directory
    mode: "0755"

# Delegated to the target so the rsync runs machine-locally — otherwise the
# controller's copy of the plugin would be pushed over SSH instead of the one
# the cask just installed on this machine.
- name: Copy DroidCam plugin to user plugins directory
  ansible.posix.synchronize:
    src: /Library/Application Support/obs-studio/plugins/droidcamobs.plugin/
    dest: ~/Library/Application Support/obs-studio/plugins/droidcamobs.plugin/
    delete: true
  delegate_to: "{{ inventory_hostname }}"
  become: false
