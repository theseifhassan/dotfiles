---
# roles/raycast/tasks/main.yml
# Installs the Raycast Beta build from the official DMG (raycast_dmg_url).
# The stable cask is intentionally not used. The Beta ships as
# "Raycast Beta.app". To upgrade, delete it (or bump the URL) and re-run.

- name: Check if Raycast Beta is installed
  ansible.builtin.stat:
    path: "/Applications/Raycast Beta.app"
  register: raycast_app

- name: Install Raycast Beta from DMG
  when: not raycast_app.stat.exists
  block:
    - name: Download Raycast Beta DMG
      ansible.builtin.get_url:
        url: "{{ raycast_dmg_url }}"
        dest: /tmp/raycast-beta.dmg
        mode: "0644"

    - name: Mount Raycast DMG
      ansible.builtin.command:
        cmd: hdiutil attach /tmp/raycast-beta.dmg -nobrowse -mountpoint /tmp/raycast_mount
      changed_when: false

    - name: Find Raycast app bundle in mounted DMG
      ansible.builtin.find:
        paths: /tmp/raycast_mount
        patterns: "*.app"
        file_type: directory
      register: raycast_bundle

    - name: Copy Raycast to Applications
      ansible.builtin.command:
        cmd: ditto "{{ raycast_bundle.files[0].path }}" "/Applications/{{ raycast_bundle.files[0].path | basename }}"
      when: raycast_bundle.matched > 0

    - name: Remove quarantine flag from Raycast
      ansible.builtin.command:
        cmd: xattr -rd com.apple.quarantine "/Applications/{{ raycast_bundle.files[0].path | basename }}"
      when: raycast_bundle.matched > 0

  always:
    - name: Unmount Raycast DMG
      ansible.builtin.command:
        cmd: hdiutil detach /tmp/raycast_mount
      changed_when: false
      failed_when: false
