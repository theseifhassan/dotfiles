---
# roles/fzf/tasks/main.yml
# Installs fzf via Homebrew, clones the fzf-tab plugin for zsh,
# and deploys a conf.d snippet that configures fzf defaults,
# completion styling, and loads fzf-tab.

- name: Install fzf via Homebrew
  community.general.homebrew:
    name: fzf
    state: present

- name: Create zsh plugins directory
  ansible.builtin.file:
    path: "{{ xdg_data_home }}/zsh/plugins"
    state: directory
    mode: "0700"

- name: Clone fzf-tab plugin
  ansible.builtin.git:
    repo: "https://github.com/Aloxaf/fzf-tab.git"
    dest: "{{ xdg_data_home }}/zsh/plugins/fzf-tab"
    version: master
    depth: 1
    update: false

- name: Deploy fzf zsh config
  ansible.builtin.file:
    src: "{{ role_path }}/files/fzf.zsh"
    dest: "{{ xdg_config_home }}/zsh/conf.d/fzf.zsh"
    state: link
    force: true
