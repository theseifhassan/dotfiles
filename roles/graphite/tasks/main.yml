---
# roles/graphite/tasks/main.yml
# Installs the Graphite CLI via Homebrew and deploys a user_config with
# work and personal profile tokens injected from 1Password.
# Graphite natively respects XDG_CONFIG_HOME.

# =============================================================================
# Prerequisites
# =============================================================================

- name: Verify Homebrew is installed
  ansible.builtin.command: brew --version
  register: brew_check
  changed_when: false
  failed_when: false
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"

- name: Fail if Homebrew is not installed
  ansible.builtin.fail:
    msg: "Homebrew is not installed. Run bootstrap.sh first."
  when: brew_check.rc != 0

# =============================================================================
# Install
# =============================================================================

- name: Install Graphite CLI via Homebrew
  community.general.homebrew:
    name: withgraphite/tap/graphite
    state: present
    path: "/opt/homebrew/bin:/usr/local/bin"

# =============================================================================
# Configuration
# =============================================================================

- name: Create Graphite config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/graphite"
    state: directory
    mode: "0700"

- name: Resolve Graphite tokens from 1Password
  ansible.builtin.set_fact:
    _graphite_tokens: "{{ _graphite_tokens | default({}) | combine({item: lookup('community.general.onepassword', op_graphite_tokens[item].item, field=op_graphite_tokens[item].field, vault=op_vault)}) }}"
  loop: "{{ identity_profiles }}"
  loop_control:
    label: "{{ item }}"
  no_log: true

- name: Verify Graphite tokens are non-empty
  ansible.builtin.assert:
    that:
      - _graphite_tokens[item] | length > 0
    fail_msg: "Graphite token for '{{ item }}' is empty or missing in 1Password (item: {{ op_graphite_tokens[item].item }})"
  loop: "{{ identity_profiles }}"
  loop_control:
    label: "{{ item }}"
  no_log: true

- name: Deploy Graphite user_config
  ansible.builtin.template:
    src: user_config.j2
    dest: "{{ xdg_config_home }}/graphite/user_config"
    mode: "0600"
    validate: "python3 -m json.tool %s"
  no_log: true
