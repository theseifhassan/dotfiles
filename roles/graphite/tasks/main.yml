---
# roles/graphite/tasks/main.yml
# Installs the Graphite CLI via Homebrew and deploys a user_config with
# work and personal profile tokens from Ansible Vault.
# Graphite natively respects XDG_CONFIG_HOME.

- name: Tap withgraphite/tap Homebrew repository
  community.general.homebrew_tap:
    name: withgraphite/tap
    state: present
    path: "/opt/homebrew/bin:/usr/local/bin"

- name: Install Graphite CLI via Homebrew
  community.general.homebrew:
    name: withgraphite/tap/graphite
    state: latest
    path: "/opt/homebrew/bin:/usr/local/bin"

- name: Create Graphite config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/graphite"
    state: directory
    mode: "0700"

- name: Deploy Graphite user_config
  ansible.builtin.template:
    src: user_config.j2
    dest: "{{ xdg_config_home }}/graphite/user_config"
    mode: "0600"
    validate: "python3 -m json.tool %s"
  no_log: true
