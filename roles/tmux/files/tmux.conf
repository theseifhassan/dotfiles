# tmux configuration — XDG-native (tmux 3.1+)

# Pass the outer terminal's TERM through so programs inside tmux get the same
# capabilities (truecolor, ...) as outside; Ghostty ships its own terminfo.
# extkeys forwards CSI-u keys (e.g. Shift+Enter in Claude Code) to apps that
# request them.
set -g default-terminal "${TERM}"
set -as terminal-features ',xterm*:RGB'
set -g extended-keys on
set -as terminal-features ',xterm*:extkeys'

# --- XDG-compliant TPM path ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

# --- Plugins (managed by TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux'
# Transparent bar strip: the plugin's default paints it mantle, one shade off
# the terminal's base — visible against Ghostty's translucent background.
# 'terminal' (the terminal default color) composites with Ghostty's
# opacity/blur. Not the plugin's 'none' mode: tmux 3.7 rejects fg=none.
set -g @catppuccin_status_background 'terminal'

# The window pills are hand-rolled below (the plugin's rounded caps use a
# reverse-video trick that breaks on a transparent bar); 'none' keeps the
# plugin from composing window formats at all, so tabs never flash through a
# plugin-styled intermediate state during a theme-change reload.
set -g @catppuccin_window_status_style 'none'

# Prompt/message line (rename-session, command prompt, ...): the plugin makes
# it teal-on-transparent and centred, which renders typed input floating over
# the pills. One quiet solid row instead. Defined once here; applied after the
# plugin loads AND re-applied by the theme hooks — the plugin re-sets these
# styles on every load, including TPM's async startup run.
set -g @msg_style 'fg=#{@thm_fg},bg=#{@thm_surface_0},fill=#{@thm_surface_0},align=left'

# Pane borders, via plugin options so theme flips re-bake them: inactive
# barely-there, active in the same mauve as the current window's number chip
# (lavender while in copy-mode).
set -g @catppuccin_pane_border_style 'fg=#{E:@thm_surface_1}'
set -g @catppuccin_pane_active_border_style '##{?pane_in_mode,fg=#{E:@thm_mauve},fg=#{E:@thm_lavender}}'

# Follow the terminal's light/dark theme: swap the catppuccin flavor, purge
# the palette (@thm_*/@_ctp_* are set with -o, only-if-unset, so stale colors
# survive a plain reload), and re-source the plugin's core conf — directly and
# synchronously, in the SAME tmux command batch as the purge. Anything less
# atomic flickers: re-sourcing the whole config runs the plugin via TPM's
# async bash, and the bar repaints unstyled in the gap between the purge and
# the palette coming back. Our pill formats below reference @thm_* at render
# time and recolor without any re-baking.
set-hook -g client-light-theme { set -g @catppuccin_flavor latte ; run-shell 'tmux $(tmux show -g | grep -oE "^@(thm|_ctp)[^ ]*" | sed "s/^/set -gu /; s/\$/ ;/") source-file ~/.local/share/tmux/plugins/tmux/catppuccin_tmux.conf \; set -g message-style "#{E:@msg_style}" \; set -g message-command-style "#{E:@msg_style}"' }
set-hook -g client-dark-theme { set -g @catppuccin_flavor mocha ; run-shell 'tmux $(tmux show -g | grep -oE "^@(thm|_ctp)[^ ]*" | sed "s/^/set -gu /; s/\$/ ;/") source-file ~/.local/share/tmux/plugins/tmux/catppuccin_tmux.conf \; set -g message-style "#{E:@msg_style}" \; set -g message-command-style "#{E:@msg_style}"' }

# --- Options ---
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g focus-events on
set -g mouse on

# Top, because Ghostty drops the cell-size surplus at the bottom edge — a
# bottom bar floats above a visible gap.
set -g status-position top

# vi copy-mode: v selects, y yanks to the macOS clipboard via pbcopy
# (set-clipboard covers the OSC52 path).
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# tmux-sessionizer
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# vim-like pane switching (prefix-based)
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

run '~/.local/share/tmux/plugins/tpm/tpm'

# Post-plugin status content (catppuccin's @thm_* colors exist only after the
# run line above). The session module renders as a pill: green, red while the
# prefix is active.
set -g status-left-length 100
set -g status-right ""
set -g message-style "#{E:@msg_style}"
set -g message-command-style "#{E:@msg_style}"

# --- Filled pills on a transparent bar strip (never color the whole bar: an
# --- opaque strip exposes Ghostty's padding seams). Pill backgrounds are
# --- per-flavor: latte can afford lighter grays (crust/surface_0), but in
# --- mocha those sit BELOW the background and pills read as holes, so mocha
# --- stays on the surface family. Accent (current window chip + active pane
# --- border): lavender.
set -g @pill_soft "#{?#{==:#{@catppuccin_flavor},latte},#{@thm_crust},#{@thm_surface_1}}"
set -g @pill_deep "#{?#{==:#{@catppuccin_flavor},latte},#{@thm_surface_0},#{@thm_surface_2}}"
set -g status-left "#[fg=#{E:@pill_soft},bg=terminal]#[fg=#{@thm_fg},bg=#{E:@pill_soft}]#{=/20/…:session_name}#[fg=#{E:@pill_soft},bg=terminal] "
set -g window-status-separator " "
set -g window-status-format "#[fg=#{E:@pill_soft},bg=terminal]#[fg=#{@thm_subtext_0},bg=#{E:@pill_soft}]#I #{=/20/…:pane_title}#[fg=#{E:@pill_soft},bg=terminal]"
set -g window-status-current-format "#[fg=#{@thm_lavender},bg=terminal]#[fg=#{@thm_crust},bg=#{@thm_lavender}]#I #[fg=#{@thm_fg},bg=#{E:@pill_deep},bold] #{=/20/…:pane_title}#[fg=#{E:@pill_deep},bg=terminal]"
