# tmux configuration — XDG-native (tmux 3.1+)

# --- Terminal / truecolor ---
# Without these, tmux falls back to a screen* TERM that drops 24-bit color,
# so programs render with a degraded palette inside tmux vs. outside it.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"

# --- XDG-compliant TPM path ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

# --- Plugins (managed by TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g base-index 1
set -g set-clipboard on
set -g mouse on

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# tmux-sessionizer
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# vim-like pane switching (prefix-based)
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

run '~/.local/share/tmux/plugins/tpm/tpm'
