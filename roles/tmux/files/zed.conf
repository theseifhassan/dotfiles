# zed.conf — tmux config for Zed-backed persistent sessions.
#
# Loaded only on the dedicated 'zed' socket (see zed-term), kept separate from
# the interactive tmux.conf so the normal tmux / tmux-sessionizer workflow is
# untouched. Tuned to feel native inside Zed: no status bar (Zed draws its own
# tabs/splits), mouse passthrough, and no size-fighting with other clients.

set -g status off              # no tmux chrome — Zed's own UI is the chrome
set -g mouse on                # scroll + click-to-focus inside Zed's terminal
setw -g aggressive-resize on   # size to the active client, not the smallest
set -g base-index 1
set -g set-clipboard on

# vi-style copy mode, matching the interactive config.
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
