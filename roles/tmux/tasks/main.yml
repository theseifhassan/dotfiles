---
# roles/tmux/tasks/main.yml
# Installs tmux via Homebrew, deploys its configuration to the XDG config path,
# and clones the Tmux Plugin Manager (TPM) into the XDG data path.
# tmux natively respects XDG_CONFIG_HOME since version 3.1.
- name: Install tmux via Homebrew
  community.general.homebrew:
    name: tmux
    state: latest
    path: "/opt/homebrew/bin:/usr/local/bin"

- name: Create tmux config directory
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/tmux"
    state: directory
    mode: "0700"

- name: Deploy tmux config
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: "{{ xdg_config_home }}/tmux/tmux.conf"
    mode: "0644"

- name: Create tmux data directory
  ansible.builtin.file:
    path: "{{ xdg_data_home }}/tmux"
    state: directory
    mode: "0700"

- name: Create tmux plugins directory
  ansible.builtin.file:
    path: "{{ xdg_data_home }}/tmux/plugins"
    state: directory
    mode: "0700"

- name: Clone TPM into XDG data path
  ansible.builtin.git:
    repo: "https://github.com/tmux-plugins/tpm.git"
    dest: "{{ xdg_data_home }}/tmux/plugins/tpm"
    version: master
    depth: 1
    update: false  # Only clone once; run TPM's update keybinding (<prefix> U) to upgrade manually
