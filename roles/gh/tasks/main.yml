---
# roles/gh/tasks/main.yml
# Installs the GitHub CLI via Homebrew.
# gh natively respects XDG_CONFIG_HOME, so no explicit GH_CONFIG_DIR export is
# needed — the xdg role already sets XDG_CONFIG_HOME.

- name: Install gh via Homebrew
  community.general.homebrew:
    name: gh
    state: latest
    path: "/opt/homebrew/bin:/usr/local/bin"
