---
# roles/gh/tasks/main.yml
# Installs the GitHub CLI via Homebrew.
# gh natively respects XDG_CONFIG_HOME, so no explicit GH_CONFIG_DIR export is
# needed — the xdg role already sets XDG_CONFIG_HOME.

# =============================================================================
# Prerequisites
# =============================================================================

- name: Verify Homebrew is installed
  ansible.builtin.command: brew --version
  register: brew_check
  changed_when: false
  failed_when: false
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"

- name: Fail if Homebrew is not installed
  ansible.builtin.fail:
    msg: "Homebrew is not installed. Run bootstrap.sh first."
  when: brew_check.rc != 0

# =============================================================================
# Install
# =============================================================================

- name: Install gh via Homebrew
  community.general.homebrew:
    name: gh
    state: present
    path: "/opt/homebrew/bin:/usr/local/bin"
