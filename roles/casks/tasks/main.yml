---
# roles/casks/tasks/main.yml
# Trivial single-cask GUI apps that carry no config or install logic of their
# own. Each gets its own tag so a single app can still be targeted, e.g.:
#   ansible-playbook site.yml -t slack   # just Slack
#   ansible-playbook site.yml -t casks   # all of the below
# Profile-specific apps carry a `when` guard (slack work-only, discord
# personal-only). Apps with real logic or config (gather, wisprflow, raycast,
# obs, 1password, zed, ...) keep their own dedicated roles.

- name: Install Google Chrome
  community.general.homebrew_cask:
    name: google-chrome
    state: latest
  tags: [casks, chrome]

- name: Install Notion
  community.general.homebrew_cask:
    name: notion
    state: latest
  tags: [casks, notion]

- name: Install Slack
  community.general.homebrew_cask:
    name: slack
    state: latest
  tags: [casks, slack]
  when: profile == "work"

- name: Install Figma
  community.general.homebrew_cask:
    name: figma
    state: latest
  tags: [casks, figma]

- name: Install Linear
  community.general.homebrew_cask:
    name: linear-linear
    state: latest
  tags: [casks, linear]

- name: Install Discord
  community.general.homebrew_cask:
    name: discord
    state: latest
  tags: [casks, discord]
  when: profile == "personal"

- name: Install DataGrip
  community.general.homebrew_cask:
    name: datagrip
    state: latest
  tags: [casks, datagrip]
