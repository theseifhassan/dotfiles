---
# playbook-server.yml
# Provisioning for the always-on dev server (Mac mini). Runs the full default
# role set, then layers on the server-specific roles:
#   - tailscale  : joins the tailnet AND advertises Tailscale SSH so clients
#                  can reach it headless
#   - server     : sleep prevention (never sleeps, disks never spin down)
#   - colima     : headless Docker runtime
#   - onepassword: headless `op` via a 1Password service-account token
#
# Server roles touch system settings and need sudo; ansible_become_password is
# wired from vault_sudo_password (group_vars), so --ask-vault-pass is enough.
#
# Run with: ansible-playbook playbook-server.yml --ask-vault-pass
#       or: ./bootstrap.sh playbook-server.yml
- name: Modular Dotfiles System (server)
  hosts: localhost
  connection: local
  gather_facts: true
  gather_subset:
    - "!all"
    - user_dir
    - env

  module_defaults:
    community.general.homebrew:
      path: /opt/homebrew/bin:/usr/local/bin
    community.general.homebrew_cask:
      path: /opt/homebrew/bin:/usr/local/bin
    community.general.homebrew_tap:
      path: /opt/homebrew/bin:/usr/local/bin

  pre_tasks:
    - name: Run xdg role
      ansible.builtin.include_role:
        name: xdg
      tags: [always]

    - name: Run homebrew role
      ansible.builtin.include_role:
        name: homebrew
      tags: [always]

  roles:
    - role: ssh
      tags: [ssh]

    - role: git
      tags: [git]

    - role: zsh
      tags: [zsh]

    - role: mise
      tags: [mise]

    - role: fzf
      tags: [fzf]

    - role: ghostty
      tags: [ghostty]

    - role: tmux
      tags: [tmux]

    - role: neovim
      tags: [neovim]

    - role: claude
      tags: [claude]

    - role: zed
      tags: [zed]

    - role: 1password
      tags: [1password]

    - role: slack
      tags: [slack]

    - role: datagrip
      tags: [datagrip]

    - role: figma
      tags: [figma]

    - role: linear
      tags: [linear]

    - role: discord
      tags: [discord]

    - role: apps
      tags: [apps]

    - role: gather
      tags: [gather]

    - role: wisprflow
      tags: [wisprflow]

    - role: raycast
      tags: [raycast]

    - role: obs
      tags: [obs]

    - role: fonts
      tags: [fonts]

    # Networking — join the tailnet and advertise Tailscale SSH so clients can
    # reach this server headless.
    - role: tailscale
      tags: [tailscale]
      vars:
        tailscale_ssh: true

    # Always-on server infrastructure.
    - role: server
      tags: [server]

    - role: colima
      tags: [colima]

    - role: onepassword
      tags: [onepassword]
