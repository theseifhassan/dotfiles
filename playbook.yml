---
- name: Modular Dotfiles System
  hosts: localhost
  connection: local
  gather_facts: true
  gather_subset:
    - "!all"
    - user_dir
    - env

  module_defaults:
    community.general.homebrew:
      path: /opt/homebrew/bin:/usr/local/bin
    community.general.homebrew_cask:
      path: /opt/homebrew/bin:/usr/local/bin
    community.general.homebrew_tap:
      path: /opt/homebrew/bin:/usr/local/bin

  pre_tasks:
    - name: Run xdg role
      ansible.builtin.include_role:
        name: xdg
      tags: [always]

    - name: Run homebrew role
      ansible.builtin.include_role:
        name: homebrew
      tags: [always]

  roles:
    - role: ssh
      tags: [ssh]

    - role: git
      tags: [git]

    - role: zsh
      tags: [zsh]

    - role: starship
      tags: [starship]

    - role: mise
      tags: [mise]

    - role: fzf
      tags: [fzf]

    - role: ghostty
      tags: [ghostty]

    - role: tmux
      tags: [tmux]

    - role: neovim
      tags: [neovim]

    - role: claude
      tags: [claude]

    - role: zed
      tags: [zed]

    - role: aerospace
      tags: [aerospace]

    - role: apps
      tags: [apps]

    - role: obs
      tags: [obs]

    - role: fonts
      tags: [fonts]
