---
- name: Modular Dotfiles System
  hosts: localhost
  connection: local
  gather_facts: true
  gather_subset:
    - "!all"
    - user_dir
    - env

  module_defaults:
    community.general.homebrew:
      path: /opt/homebrew/bin:/usr/local/bin
    community.general.homebrew_cask:
      path: /opt/homebrew/bin:/usr/local/bin
    community.general.homebrew_tap:
      path: /opt/homebrew/bin:/usr/local/bin

  pre_tasks:
    - name: Run xdg role
      ansible.builtin.include_role:
        name: xdg
      tags: [always]

    - name: Run homebrew role
      ansible.builtin.include_role:
        name: homebrew
      tags: [always]

  roles:
    # --- Identity & Credentials ---
    - role: ssh
      tags: [ssh]
    - role: git
      tags: [git]

    # --- Shell ---
    - role: zsh
      tags: [zsh]
    - role: starship
      tags: [starship]
    - role: mise
      tags: [mise]

    # --- Editors & Terminal ---
    - role: ghostty
      tags: [ghostty]
    - role: tmux
      tags: [tmux]
    - role: neovim
      tags: [neovim]
    - role: claude-code
      tags: [claude-code]
    - role: zed
      tags: [zed]

    # --- Desktop ---
    - role: aerospace
      tags: [aerospace]
    - role: apps
      tags: [apps]

    # --- Fonts (requires SSH for private repo) ---
    - role: fonts
      tags: [fonts]
