# Two workstations, one profile each — both full development environments.
# The Mac mini doubles as the Ansible controller: it provisions itself over
# the local connection and pushes to the MacBook over Tailscale SSH (MagicDNS
# name). Profile differences live in group_vars/personal and group_vars/work.
#
# First-time MacBook setup: run ./bootstrap-target.sh macbook once (installs
# Xcode CLT + Homebrew over SSH), then ansible-playbook site.yml --limit work.

[personal]
macmini ansible_connection=local

[work]
macbook ansible_host=macbook ansible_user=seifhassan
